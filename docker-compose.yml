
services:
  mongodb:
    image: mongo:7
    container_name: smartcampus-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: smartcampus
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartcampus-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartcampus-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/smartcampus?authSource=admin
      JWT_SECRET: smartcampus-jwt-secret-key-2026-production
      JWT_EXPIRATION: 86400000
      FRONTEND_URL: http://localhost:5174
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads
    networks:
      - smartcampus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartcampus-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - smartcampus-net

volumes:
  mongodb_data:
  uploads_data:

networks:
  smartcampus-net:
    driver: bridge
