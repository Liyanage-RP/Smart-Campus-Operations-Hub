# Application
spring.application.name=Smart Campus Operations Hub
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://admin:admin123@localhost:27017/smartcampus?authSource=admin}
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.secret=${JWT_SECRET:smartcampus-jwt-secret-key-2026-development-only}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth 2.0
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=${UPLOAD_DIR:uploads}

# Logging
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=DEBUG
